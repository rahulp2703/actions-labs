name: Hello World

on:
  pull_request:

jobs:
  startup:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: |
          echo "Hello World from GitHub Actions"

  build:
    runs-on: ubuntu-latest
    needs: startup

    steps:
      - uses: actions/checkout@v4

      - name: Add PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr comment "$PR_URL" \
            --body "Hello World from GitHub Actions"